<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Store</title>

<style>

body {
  font-family: Arial;
  margin:0;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1542838132-92c53300491e");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color:#fff;
}

header {
  background: linear-gradient(45deg, #ff6a00, #ee0979);
  color:#fff;
  padding:15px;
  text-align:center;
}

.layout { display:flex; flex-wrap:wrap; }

.container { padding:20px; width:70%; }
.category { margin-bottom:40px; }

.category h2 { color:#fff; }

.products {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card {
  background:#fff;
  color:#000;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

button {
  background:#28a745;
  color:#fff;
  border:none;
  padding:5px 10px;
  margin:3px;
  border-radius:5px;
  cursor:pointer;
}

.cart {
  width:30%;
  background:#fff;
  color:#000;
  padding:15px;
  box-shadow:-2px 0 5px rgba(0,0,0,0.2);
}

input { width:100%; padding:8px; margin:5px 0; }

.qr { display:none; text-align:center; }
.qr img { width:200px; }

@media(max-width:768px){
.container,.cart { width:100%; }
}

</style>
</head>

<body>

<header>
<h1>SMART STORE</h1>
</header>

<!-- ✅ Refresh Button -->
<button onclick="location.reload()" 
style="position:fixed; top:10px; right:10px; padding:6px 10px; background:#ff4b2b; color:#fff; border:none; border-radius:5px; cursor:pointer;">
↻ Refresh
</button>

<div class="layout">

<div class="container" id="productSections"></div>

<div class="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p><strong>Total: ₹<span id="total">0</span></strong></p>

<input placeholder="Name" id="name">
<input placeholder="Address" id="address">
<input placeholder="Phone" id="phone">

<button onclick="checkout()">Pay</button>

<div class="qr" id="qrBox">
<img id="qrImage">
</div>

<p id="dietPlan"></p>
</div>

</div>

<script>

const products = [
{id:1,name:"T-Shirt",price:500,unit:"piece",cat:"Fashion",img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
{id:2,name:"Shoes",price:1500,unit:"pair",cat:"Fashion",img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff"},
{id:3,name:"Watch",price:2000,unit:"piece",cat:"Fashion",img:"https://images.unsplash.com/photo-1519741497674-611481863552"},
{id:4,name:"Backpack",price:900,unit:"piece",cat:"Fashion",img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"},

{id:7,name:"Apples",price:120,unit:"kg",cat:"Groceries",img:"https://images.unsplash.com/photo-1567306226416-28f0efdc88ce"},
{id:19,name:"Tomatoes",price:50,unit:"kg",cat:"Groceries",img:"https://images.unsplash.com/photo-1582284540020-8acbe03f4924"},
{id:20,name:"Potatoes",price:40,unit:"kg",cat:"Groceries",img:"https://images.unsplash.com/photo-1518977676601-b53f82aba655"},
{id:21,name:"Onions",price:45,unit:"kg",cat:"Groceries",img:"https://images.unsplash.com/photo-1508747703725-719777637510"},

{id:10,name:"Eggs and Paneer salad ",price:900,unit:"kg",cat:"Dairy",img:"https://images.unsplash.com/photo-1505576399279-565b52d4ac71"},
{id:18,name:"Paneer",price:350,unit:"kg",cat:"Dairy",img:"https://images.unsplash.com/photo-1598514983318-2f64f8f4796c"},
{id:17,name:"Chicken",price:400,unit:"kg",cat:"Dairy",img:"https://images.unsplash.com/photo-1600891964599-f61ba0e24092"},

{id:9,name:"Bread",price:40,unit:"packet",cat:"Essentials",img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec"},
{id:11,name:"Rice",price:500,unit:"kg",cat:"Essentials",img:"https://images.unsplash.com/photo-1586201375761-83865001e31c"},
{id:22,name:"Oil",price:180,unit:"L",cat:"Essentials",img:"https://images.unsplash.com/photo-1604908177225-45c3d5f3c7c1"},
{id:24,name:"Honey",price:445,unit:"kg",cat:"Essentials",img:"https://images.unsplash.com/photo-1587049352851-8d4e89133924"},

{id:30,name:"Mineral Water",price:20,unit:"bottle",cat:"Drinks",img:"https://images.unsplash.com/photo-1564419320461-6870880221ad"},
{id:31,name:"Coca Cola",price:40,unit:"bottle",cat:"Drinks",img:"https://images.unsplash.com/photo-1581636625402-29b2a704ef13"},
{id:32,name:"Fanta",price:40,unit:"bottle",cat:"Drinks",img:"https://images.unsplash.com/photo-1624517452488-04869289c4ca"},
{id:33,name:"Orange juice",price:40,unit:"bottle",cat:"Drinks",img:"https://images.unsplash.com/photo-1613478223719-2ab802602423"}
];

let cart=[];

function renderProducts(){
const container=document.getElementById("productSections");
container.innerHTML="";
let categories=[...new Set(products.map(p=>p.cat))];

categories.forEach(cat=>{
container.innerHTML+=`<div class="category"><h2>${cat}</h2><div class="products" id="${cat}"></div></div>`;
let section=document.getElementById(cat);

products.filter(p=>p.cat===cat).forEach(p=>{
let qty=cart.find(i=>i.id===p.id)?.qty||0;

section.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}/${p.unit}</p>
<p>Qty: ${qty}</p>
<button onclick="add(${p.id})">+</button>
<button onclick="removeP(${p.id})">-</button>
</div>`;
});
});
}

function add(id){
let p=products.find(x=>x.id===id);
let e=cart.find(x=>x.id===id);
if(e) e.qty++;
else cart.push({...p,qty:1});
renderCart(); renderProducts();
}

function removeP(id){
let e=cart.find(x=>x.id===id);
if(!e) return;
e.qty--;
if(e.qty<=0) cart=cart.filter(x=>x.id!==id);
renderCart(); renderProducts();
}

function renderCart(){
let el=document.getElementById("cartItems");
let total=0;
el.innerHTML="";

cart.forEach((i,index)=>{
let sub=i.qty*i.price;
total+=sub;

el.innerHTML+=`
<li>${i.name} (${i.qty}) - ₹${sub}
<button onclick="cart.splice(${index},1);renderCart();renderProducts()">X</button>
</li>`;
});

let discountRate = total > 2000 ? 0.15 : 0.10;
let finalTotal = total - (total*discountRate);

document.getElementById("total").innerText=finalTotal.toFixed(0);
}

function checkout(){
let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

let discountRate = total > 2000 ? 0.15 : 0.10;
let discount = total * discountRate;
let finalTotal = total - discount;

document.getElementById("qrImage").src=
`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=demo@upi&pn=Store&am=${finalTotal.toFixed(0)}`;

document.getElementById("qrBox").style.display="block";

document.getElementById("dietPlan").innerHTML = `
<hr>
<h3>🧾 Final Bill</h3>
<p>Subtotal: ₹${total}</p>
<p>Discount (${discountRate*100}%): -₹${discount.toFixed(0)}</p>
<p><strong>Total Payable: ₹${finalTotal.toFixed(0)}</strong></p>
<br>
<h3>🙏 Thank You for Shopping!</h3>
`;
}

renderProducts();

</script>

</body>
</html>
